<!DOCTYPE html>
<html>
<head>
  <!--

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="alarmm">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>alarmm</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
  <script>
    let _faceApiReady = false;
    async function initFaceApi() {
      if (_faceApiReady) return true;
      try {
        const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/model/';
        await faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl);
        await faceapi.nets.faceExpressionNet.loadFromUri(modelUrl);
        _faceApiReady = true;
        return true;
      } catch(e) {
        console.error('FaceAPI init error:', e);
        return false;
      }
    }
    async function detectExpression(videoElement) {
      if (!_faceApiReady || !videoElement) return null;
      try {
        const detection = await faceapi
          .detectSingleFace(videoElement, new faceapi.TinyFaceDetectorOptions({inputSize: 160, scoreThreshold: 0.3}))
          .withFaceExpressions();
        if (!detection) return null;
        const expr = detection.expressions;
        let maxEmotion = 'neutral';
        let maxConf = 0;
        for (const [emotion, confidence] of Object.entries(expr)) {
          if (confidence > maxConf) { maxConf = confidence; maxEmotion = emotion; }
        }
        return JSON.stringify({emotion: maxEmotion, confidence: maxConf});
      } catch(e) {
        return null;
      }
    }
    async function captureFrame(videoElement) {
      if (!videoElement) return null;
      try {
        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        canvas.getContext('2d').drawImage(videoElement, 0, 0);
        return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      } catch(e) {
        return null;
      }
    }
    var EmotionCam = {
      video: null,
      stream: null,
      init: async function() {
        try {
          this.stream = await navigator.mediaDevices.getUserMedia({
            video: {facingMode: 'user', width: {ideal: 160}, height: {ideal: 120}},
            audio: false
          });
          this.video = document.createElement('video');
          this.video.srcObject = this.stream;
          this.video.autoplay = true;
          this.video.muted = true;
          this.video.setAttribute('playsinline', '');
          this.video.style.width = '100%';
          this.video.style.height = '100%';
          this.video.style.objectFit = 'cover';
          this.video.style.transform = 'scaleX(-1)';
          await this.video.play();
          console.log('[EmotionCam] Camera initialized');
          return true;
        } catch(e) {
          console.error('[EmotionCam] Init error:', e);
          return false;
        }
      },
      getVideo: function() { return this.video; },
      detect: async function() {
        if (!_faceApiReady || !this.video) return null;
        try {
          var det = await faceapi
            .detectSingleFace(this.video, new faceapi.TinyFaceDetectorOptions({inputSize: 160, scoreThreshold: 0.3}))
            .withFaceExpressions();
          if (!det) return null;
          var expr = det.expressions;
          var maxE = 'neutral', maxC = 0;
          for (var k in expr) { if (expr[k] > maxC) { maxC = expr[k]; maxE = k; } }
          return JSON.stringify({emotion: maxE, confidence: maxC});
        } catch(e) { return null; }
      },
      capture: function() {
        if (!this.video) return null;
        try {
          var c = document.createElement('canvas');
          c.width = this.video.videoWidth || 160;
          c.height = this.video.videoHeight || 120;
          c.getContext('2d').drawImage(this.video, 0, 0);
          return c.toDataURL('image/jpeg', 0.7).split(',')[1];
        } catch(e) { return null; }
      },
      stop: function() {
        if (this.stream) {
          this.stream.getTracks().forEach(function(t) { t.stop(); });
          this.stream = null;
        }
        if (this.video) {
          this.video.pause();
          this.video.srcObject = null;
          this.video = null;
        }
        console.log('[EmotionCam] Stopped');
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
