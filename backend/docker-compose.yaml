version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: alarmm_postgres_container
    restart: always
    ports:
      - "5432:5432" 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_super_secret_password 
      POSTGRES_DB: alarmm_db 
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: alarmm_redis_container
    restart: always
    ports:
      - "6379:6379"